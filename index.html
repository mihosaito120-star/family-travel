<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>家族旅行ポータル</title>
  <link rel="stylesheet" href="assets/style.css">
</head>
<body>
<header class="hero">
  <p class="eyebrow">Family Travel Portal</p>
  <h1>家族旅行ポータル</h1>
  <p>宿・温泉・洗濯・SA仮眠・道の駅を、旅行中にすぐ開けるメモサイト。</p>
</header>
<main class="wrap">
  <section class="card">
    <h2>旅行一覧</h2>
    <div class="grid">
      <a class="trip" href="trips/osaka-himeji-fukui-2026/">
        <span class="icon">🚗</span>
        <strong>大阪・姫路・福井 2026</strong>
        <small>9/2夜出発｜海遊館・姫路城・恐竜博物館</small>
      </a>
      <a class="trip muted" href="trips/tateyama/">
        <span class="icon">🌊</span>
        <strong>館山</strong>
        <small>今後追加する旅行メモ</small>
      </a>
      <a class="trip muted" href="#">
        <span class="icon">➕</span>
        <strong>新しい旅行</strong>
        <small>このテンプレートをコピーして追加</small>
      </a>
    </div>
  </section>
  <section class="card">
    <h2>使い方</h2>
    <ol>
      <li>旅行をクリック</li>
      <li>当日の行程・宿・温泉・道の駅を確認</li>
      <li>ボタンからGoogleマップや予約サイトへ移動</li>
    </ol>
  </section>
</main>
<footer>GitHub Pages用 / family-travel</footer>
<script src="assets/script.js"></script>
</body>
</html>
